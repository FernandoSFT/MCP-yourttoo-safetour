name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
      - master

env:
  SERVICE_NAME: mcp-yourttoo
  REGION: europe-southwest1 # Madrid, cámbialo si tu proyecto de GCP usa otra región

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'
          # Nota: Si prefieres la forma más segura (Workload Identity)
          # usa workload_identity_provider y service_account aquí.

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          source: ./
          # Env vars inyectadas desde los secrets del repo
          env_vars: |-
            YOURTTOO_EMAIL=${{ secrets.YOURTTOO_EMAIL }}
            YOURTTOO_PASSWORD=${{ secrets.YOURTTOO_PASSWORD }}

      - name: Enlace de despliegue
        run: echo "Desplegado con éxito => ${{ steps.deploy.outputs.url }}/sse"
